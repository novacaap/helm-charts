  enabled: false
  annotations: {}
  data: |-

configEnv:
  enabled: false
  annotations: {}
  data: |-

configMap:
  enabled: false
  annotations: {}
  fileConfigs:
    - filename: 01_main.conf
      data: |-

    - filename: 02_main.conf
      data: |-

# Additional volumes on the output Deployment definition.
