nameOverride: ''
fullnameOverride: ''

# Deployment or StatefulSet or Job or CronJob
kind: 'Deployment'

# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

imagePullSecrets: []

## Deployment strategy
##
updateStrategy: {}
#   type: RollingUpdate
#   rollingUpdate:
#     maxUnavailable: 1

## StatefulSet allows you to relax its ordering guarantees while preserving its uniqueness and identity guarantees
podManagementPolicy: 'OrderedReady'

## CronJon & Job
schedule: '0 0 * * *'
restartPolicy: 'OnFailure'
successfulJobsHistoryLimit: 3
failedJobsHistoryLimit: 1
concurrencyPolicy: 'Allow'
suspend: false
backoffLimit: 6
timeZone: 'UTC'

### Pod Setting

## Labels to be added to Deployment/StatefulSet
## Optional labels.name and labels.version set app.kubernetes.io/name and app.kubernetes.io/version;
## when not set, chart name and Chart.AppVersion are used.
##
labels: {}
  # name: myapp      # app.kubernetes.io/name
  # version: "1.0.0" # app.kubernetes.io/version

## Annotations to be added to pods
##
podAnnotations: {}

## Labels to be added to spods
##
podLabels: {}

## How long (in seconds) a pod may take to exit (useful with lifecycle hooks to ensure lb deregistration is done)
##
terminationGracePeriodSeconds:

# https://kubernetes.io/docs/tasks/configure-pod-container/share-process-namespace/
# For share process data between containers
shareProcessNamespace: false

## Security Context policies for controller pods
## See https://kubernetes.io/docs/tasks/administer-cluster/sysctl-cluster/ for
## notes on enabling and using sysctls
##
podSecurityContext: {}
  # fsGroup: 2000

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ''

shareVolume: /var/log/acute

