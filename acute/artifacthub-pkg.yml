readme: |
  # Acute Helm Chart

  A flexible and comprehensive Helm chart for deploying applications on Kubernetes. This chart supports multiple workload types including Deployments, StatefulSets, Jobs, and CronJobs, with extensive configuration options for production-ready deployments.

  ## Features

  - **Multiple workload types**: Deployment, StatefulSet, Job, and CronJob
  - **Auto-scaling**: Horizontal Pod Autoscaler (HPA) and KEDA ScaledObject
  - **Networking**: Service, Ingress, and NetworkPolicy
  - **Configuration management**: ConfigMap and Secret support
  - **High availability**: PodDisruptionBudget and health probes
  - **Security**: ServiceAccount, security contexts, and network policies

  ## Quick Start

  ```bash
  helm repo add kalpeshbpatel https://kalpeshbpatel.github.io/helm-chart
  helm repo update
  helm install my-release kalpeshbpatel/acute
  ```

  For detailed documentation, see the [chart README](https://github.com/kalpeshbpatel/helm-chart/tree/main/acute).

install: |
  ## Installation

  ### Add the Helm repository

  ```bash
  helm repo add kalpeshbpatel https://kalpeshbpatel.github.io/helm-chart
  helm repo update
  ```

  ### Install the chart

  ```bash
  helm install <release-name> kalpeshbpatel/acute
  ```

  ### Install with custom values

  ```bash
  helm install <release-name> kalpeshbpatel/acute -f my-values.yaml
  ```

  ### Basic example values

  ```yaml
  kind: Deployment
  replicaCount: 2
  containers:
    - name: nginx
      image:
        repository: nginx
        tag: "1.25-alpine"
      service:
        enabled: true
        type: ClusterIP
        ports:
          - name: http
            port: 80
            targetPort: 80
  ```

  **Note**: This chart uses `nginx:1.25-alpine` as the default image. For production use, always specify a specific image tag instead of using `latest` to avoid security vulnerabilities.

  For more configuration options, see the [values.yaml](https://github.com/kalpeshbpatel/helm-chart/blob/main/acute/values.yaml) file.

